name: knowledge_graph_app
description: 移动应用开发知识图谱教学系统
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^0.4.3+1
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.1
  path: ^1.9.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  http: ^1.2.1
  pdf: ^3.10.8
  printing: ^5.13.1
  cached_network_image: ^3.3.1
  open_filex: ^4.7.0
  file_picker: ^10.3.10
  excel: ^4.0.6
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/graphs/01-课程图谱/
    - assets/graphs/02-技术栈图谱/
    - assets/graphs/03-实验图谱/
    - assets/graphs/04-项目图谱/
    - assets/graphs/05-教学图谱/
    - assets/graphs/06-学习图谱/
